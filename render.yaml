# Deploy API only: https://dashboard.render.com → New → Blueprint → connect this repo.
# Frontend goes to Cloudflare (see DEPLOY.md).
services:
  - type: web
    name: kachkivun-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: DEFAULT_USER_TOKEN_CAP
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Payments — "mock" is blocked in production, so set the real provider here.
      - key: PAYMENTS_PROVIDER
        value: grow
      - key: GROW_ENV
        value: prod
      - key: GROW_PAGE_CODE
        sync: false
      - key: GROW_USER_ID
        sync: false
      - key: GROW_API_KEY
        sync: false

# Deploy API only: https://dashboard.render.com → New → Blueprint → connect this repo.
# Frontend goes to Cloudflare (see DEPLOY.md).
services:
  - type: web
    name: mishlahat-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://app.mike.haddad.co.il
      - key: ALLOWED_ORIGINS
        value: https://app.mike.haddad.co.il
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
